<nav class="block bg-blue-600 shadow-md">
	<!-- Top Row: Logo, Search, Cart -->
	<div class="mx-auto max-w-6xl px-4 py-3 flex flex-wrap items-center justify-between gap-4">
		<!-- Logo -->
		<a routerLink="/" class="text-2xl font-bold text-white tracking-wide shrink-0">ALTOQ</a>

		<!-- Search Bar & Cart (Hidden on auth pages) -->
		<ng-container *ngIf="!isAuthPage()">
			<!-- Search Bar (Centered & Flexible) -->
			<div class="flex-grow max-w-xl mx-4">
				<div class="relative">
					<input type="text" 
						   [(ngModel)]="searchQuery" 
						   (keyup.enter)="search()"
						   placeholder="Buscar productos..." 
						   class="w-full rounded-md border border-slate-300 bg-white py-2 pl-4 pr-10 text-slate-900 placeholder:text-slate-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 sm:text-sm sm:leading-6">
					<div class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer" (click)="search()">
						<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 hover:text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
						</svg>
					</div>
				</div>
			</div>

			<!-- Cart (Right) -->
			<div class="flex items-center shrink-0">
				<a routerLink="/cart" class="inline-flex items-center gap-2 rounded-full bg-blue-600 px-3 py-2 text-sm font-medium text-white hover:bg-blue-700 transition-colors relative">
					<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
					</svg>
					<span *ngIf="(itemCount$ | async) as count" [class.hidden]="count === 0" class="absolute -top-1 -right-1 flex h-5 w-5 items-center justify-center rounded-full bg-red-600 text-xs font-bold text-white border border-white shadow-sm">{{ count }}</span>
				</a>
			</div>
		</ng-container>
	</div>

	<!-- Bottom Row: Navigation Links (Hidden on auth pages) -->
	<div *ngIf="!isAuthPage()" class="bg-white border-b border-slate-200">
		<div class="mx-auto max-w-6xl px-4 py-2">
			<div class="flex items-center justify-between gap-6 text-sm font-medium text-slate-600">
				<div class="flex items-center gap-6">
					<a routerLink="/" routerLinkActive="text-blue-600 border-b-2 border-blue-600" [routerLinkActiveOptions]="{exact: true}" class="hover:text-blue-600 transition-colors pb-0.5">Inicio</a>
					
					<!-- Categories Dropdown -->
					<div class="relative group">
						<button (click)="toggleCategoriesDropdown()" class="flex items-center gap-1 hover:text-blue-600 transition-colors pb-0.5 focus:outline-none">
							Categorías
							<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
							</svg>
						</button>
						
						<!-- Dropdown Menu -->
						<div *ngIf="categories$ | async as categories" 
							 [class.hidden]="!showCategoriesDropdown"
							 class="absolute left-0 mt-2 w-56 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 focus:outline-none z-50">
							<div class="py-1" role="menu" aria-orientation="vertical">
								<a routerLink="/products" (click)="closeCategoriesDropdown()" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-100 hover:text-blue-600" role="menuitem">Ver todo</a>
								<div class="border-t border-slate-100 my-1"></div>
								<a *ngFor="let category of categories" 
								   [routerLink]="['/category', category.slug]" 
								   (click)="closeCategoriesDropdown()"
								   class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-100 hover:text-blue-600" 
								   role="menuitem">
								   <span class="mr-2">{{category.icon}}</span> {{ category.name }}
								</a>
							</div>
						</div>
						<!-- Overlay to close dropdown when clicking outside -->
						<div *ngIf="showCategoriesDropdown" (click)="closeCategoriesDropdown()" class="fixed inset-0 z-40 bg-transparent cursor-default"></div>
					</div>

					<a routerLink="/cart" routerLinkActive="text-blue-600 border-b-2 border-blue-600" class="hover:text-blue-600 transition-colors pb-0.5">Carrito</a>
				</div>
				
				<!-- Auth Links / User Menu -->
				<div class="flex items-center gap-4">
					<ng-container *ngIf="user$ | async as user; else guestLinks">
						<!-- User Dropdown -->
						<div class="relative group">
							<button (click)="toggleUserDropdown()" class="flex items-center gap-2 hover:text-blue-600 transition-colors pb-0.5 focus:outline-none">
								<span class="text-sm font-medium">Hola, {{ user.name.split(' ')[0] }}</span>
								<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
									<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
								</svg>
							</button>

							<!-- User Dropdown Menu -->
							<div *ngIf="showUserDropdown"
								 class="absolute right-0 mt-2 w-48 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 focus:outline-none z-50">
								<div class="py-1" role="menu" aria-orientation="vertical">
									<a routerLink="/profile" (click)="closeUserDropdown()" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-100 hover:text-blue-600" role="menuitem">Mi Perfil</a>
									<a routerLink="/orders" (click)="closeUserDropdown()" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-100 hover:text-blue-600" role="menuitem">Mis Pedidos</a>
									<a routerLink="/become-seller" (click)="closeUserDropdown()" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-100 hover:text-blue-600" role="menuitem">
										<span class="flex items-center gap-2">
											<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
												<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
											</svg>
											Conviértete en Vendedor
										</span>
									</a>
									<a routerLink="/seller-area" (click)="closeUserDropdown()" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-100 hover:text-blue-600" role="menuitem">
										<span class="flex items-center gap-2">
											<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
												<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
											</svg>
											Área de Vendedor
										</span>
									</a>
									<div class="border-t border-slate-100 my-1"></div>
									<button (click)="logout()" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-slate-100" role="menuitem">Cerrar Sesión</button>
								</div>
							</div>
							
							<!-- Overlay to close dropdown -->
							<div *ngIf="showUserDropdown" (click)="closeUserDropdown()" class="fixed inset-0 z-40 bg-transparent cursor-default"></div>
						</div>
					</ng-container>

					<ng-template #guestLinks>
						<a routerLink="/login" class="flex items-center gap-1.5 hover:text-blue-600 transition-colors pb-0.5">
							<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
							</svg>
							Ingresa
						</a>
						<a routerLink="/register" class="hover:text-blue-600 transition-colors pb-0.5">Crea tu cuenta</a>
					</ng-template>
				</div>
			</div>
		</div>
	</div>
</nav>
