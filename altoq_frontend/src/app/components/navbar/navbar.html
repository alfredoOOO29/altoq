<nav class="block font-sans shadow-sm">
	<!-- Top Row: Logo, Search, User Menu, Cart (Blue background) -->
	<div class="bg-[#0050d2]">
		<div class="mx-auto max-w-6xl px-4 py-3.5 flex items-center justify-between gap-4">
			<!-- Logo -->
			<a routerLink="/"
				class="text-2xl font-black tracking-wider text-white hover:opacity-95 transition-all duration-200 shrink-0 flex items-center select-none">
				<span>ALTOQ</span>
				<span class="h-2 w-2 rounded-full bg-orange-500 ml-1 shadow-sm shadow-orange-500/50"></span>
			</a>

			<!-- Search Bar & Cart & User Menu (Hidden on auth pages) -->
			<ng-container *ngIf="!isAuthPage()">
				<!-- Search Bar (Centered & Flexible) -->
				<div class="flex-grow max-w-xl mx-6">
					<div class="relative">
						<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
							<svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
							</svg>
						</div>
						<input type="text" [(ngModel)]="searchQuery" (keyup.enter)="search()"
							placeholder="Buscar productos y marcas..."
							class="w-full rounded-full border-0 bg-white py-2 pl-11 pr-4 text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm transition-all duration-200 shadow-sm">
					</div>
				</div>

				<!-- Right Section: User Menu / Ingresa & Cart -->
				<div class="flex items-center gap-5 shrink-0">
					<!-- Auth Links / User Menu (Top Row) -->
					<div class="flex items-center">
						<ng-container *ngIf="user$ | async as user; else guestLinks">
							<!-- User Dropdown -->
							<div class="relative">
								<button (click)="toggleUserDropdown()" 
									class="flex items-center gap-2 text-white hover:opacity-90 transition-all duration-150 py-1.5 focus:outline-none cursor-pointer">
									<div class="h-7 w-7 rounded-full bg-white/20 text-white flex items-center justify-center font-bold text-xs shrink-0 border border-white/25">
										{{ user.name.charAt(0).toUpperCase() }}
									</div>
									<span class="text-sm font-medium">Hola, {{ user.name.split(' ')[0] }}</span>
									<svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-white/80 transition-transform duration-200" [class.rotate-180]="showUserDropdown" fill="none" viewBox="0 0 24 24" stroke="currentColor">
										<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
									</svg>
								</button>

								<!-- User Dropdown Menu -->
								<div *ngIf="showUserDropdown"
									class="absolute right-0 top-full mt-2 w-56 rounded-xl shadow-xl bg-white border border-slate-200/65 p-1.5 focus:outline-none z-50">
									<div class="py-1">
										<div class="px-3.5 py-2.5 mb-1 bg-slate-50/50 rounded-lg">
											<p class="text-xs text-slate-400 font-normal">Usuario registrado</p>
											<p class="text-sm font-semibold text-slate-800 truncate">{{ user.name }}</p>
										</div>
										<div class="border-b border-slate-100 mb-1"></div>
										<a routerLink="/profile" (click)="closeUserDropdown()"
											class="flex items-center px-3.5 py-2.5 text-sm text-slate-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors group"
											role="menuitem">
											<div class="h-8 w-8 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center mr-2.5 shrink-0 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors">
												<svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
													<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
												</svg>
											</div>
											Mi Perfil
										</a>
										<a routerLink="/my-orders" (click)="closeUserDropdown()"
											class="flex items-center px-3.5 py-2.5 text-sm text-slate-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors group"
											role="menuitem">
											<div class="h-8 w-8 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center mr-2.5 shrink-0 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors">
												<svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
													<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
												</svg>
											</div>
											Mis Pedidos
										</a>
										<a *ngIf="!(hasStore$ | async)" routerLink="/become-seller" (click)="closeUserDropdown()"
											class="flex items-center px-3.5 py-2.5 text-sm text-slate-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors group"
											role="menuitem">
											<div class="h-8 w-8 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center mr-2.5 shrink-0 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors">
												<svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
													<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
												</svg>
											</div>
											Conviértete en Vendedor
										</a>
										<a *ngIf="hasStore$ | async" routerLink="/seller-area" (click)="closeUserDropdown()"
											class="flex items-center px-3.5 py-2.5 text-sm text-slate-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors group"
											role="menuitem">
											<div class="h-8 w-8 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center mr-2.5 shrink-0 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors">
												<svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
													<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
												</svg>
											</div>
											Área de Vendedor
										</a>
										<div class="border-t border-slate-100 my-1"></div>
										<button (click)="logout()"
											class="flex items-center w-full text-left px-3.5 py-2.5 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors cursor-pointer group"
											role="menuitem">
											<div class="h-8 w-8 rounded-lg bg-red-50 text-red-600 flex items-center justify-center mr-2.5 shrink-0 group-hover:bg-red-100/55 transition-colors">
												<svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
													<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
												</svg>
											</div>
											Cerrar Sesión
										</button>
									</div>
								</div>

								<!-- Overlay to close dropdown -->
								<div *ngIf="showUserDropdown" (click)="closeUserDropdown()" class="fixed inset-0 z-40 bg-transparent cursor-default"></div>
							</div>
						</ng-container>

						<ng-template #guestLinks>
							<a routerLink="/login"
								class="flex items-center gap-2 text-white hover:opacity-90 transition-all duration-150 py-2 cursor-pointer">
								<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white/80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
									<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
								</svg>
								<span class="text-sm font-semibold select-none">Ingresa</span>
							</a>
						</ng-template>
					</div>

					<!-- Separator Line -->
					<div class="h-5 w-[1px] bg-white/25"></div>

					<!-- Cart -->
					<a routerLink="/cart" class="relative inline-flex h-9 w-9 items-center justify-center text-white hover:opacity-90 transition-all duration-200 cursor-pointer">
						<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
						</svg>
						<span *ngIf="(itemCount$ | async) as count"
							class="absolute -top-1.5 -right-1.5 flex h-4.5 w-4.5 items-center justify-center rounded-full bg-orange-500 text-[10px] font-bold text-white border border-blue-700 shadow-sm animate-pulse">
							{{ count }}
						</span>
						<span *ngIf="!(itemCount$ | async)"
							class="absolute -top-1.5 -right-1.5 flex h-4.5 w-4.5 items-center justify-center rounded-full bg-orange-500 text-[10px] font-bold text-white border border-blue-700 shadow-sm">
							0
						</span>
					</a>
				</div>
			</ng-container>
		</div>
	</div>

	<!-- Bottom Row: Navigation Links (Hidden on auth pages) (White background) -->
	<div *ngIf="!isAuthPage()" class="bg-white border-b border-slate-200/80 py-1.5">
		<div class="mx-auto max-w-6xl px-4">
			<div class="flex items-center justify-center gap-10 text-sm font-semibold select-none">
				<a routerLink="/" routerLinkActive="text-blue-600 font-bold border-b-2 border-blue-600"
					[routerLinkActiveOptions]="{exact: true}"
					class="hover:text-blue-600 transition-all duration-150 py-2 px-1 text-slate-700">
					Inicio
				</a>

				<!-- Categories Dropdown -->
				<div class="relative">
					<button (click)="toggleCategoriesDropdown()" [class.text-blue-600]="showCategoriesDropdown"
						class="flex items-center gap-1 hover:text-blue-600 transition-all duration-150 py-2 px-1 text-slate-700 focus:outline-none cursor-pointer font-semibold">
						<span>Categorías</span>
						<svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 transition-transform duration-200" [class.rotate-180]="showCategoriesDropdown" fill="none" viewBox="0 0 24 24" stroke="currentColor">
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
						</svg>
					</button>

					<!-- Dropdown Menu -->
					<div *ngIf="categories$ | async as categories" [class.hidden]="!showCategoriesDropdown"
						class="absolute left-0 top-full mt-1.5 w-64 rounded-xl shadow-xl bg-white border border-slate-200/80 p-1.5 focus:outline-none z-50 animate-slide-down">
						<div class="py-1">
							<a routerLink="/products" (click)="closeCategoriesDropdown()"
								class="flex items-center px-3.5 py-2.5 text-sm text-slate-700 hover:bg-slate-50 hover:text-blue-600 rounded-lg transition-colors group">
								<div class="h-8 w-8 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center mr-2.5 shrink-0 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors">
									<svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
										<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
									</svg>
								</div>
								<span class="font-semibold">Ver todo</span>
							</a>
							<div class="border-t border-slate-100 my-1"></div>
							<a *ngFor="let category of categories" [routerLink]="['/category', category.slug]" (click)="closeCategoriesDropdown()"
								class="flex items-center px-3 py-2.5 text-sm text-slate-700 hover:bg-slate-50 hover:text-blue-600 rounded-lg transition-colors group">
								<div class="h-8 w-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center text-sm mr-2.5 shrink-0 group-hover:bg-blue-100/70 transition-colors">
									{{category.icon}}</div>
								<span class="font-semibold">{{ category.name }}</span>
							</a>
						</div>
					</div>
					<!-- Overlay to close dropdown -->
					<div *ngIf="showCategoriesDropdown" (click)="closeCategoriesDropdown()" class="fixed inset-0 z-40 bg-transparent cursor-default"></div>
				</div>

				<a routerLink="/products" [queryParams]="{sort: 'sold'}" routerLinkActive="text-blue-600 font-bold border-b-2 border-blue-600"
					class="hover:text-blue-600 transition-all duration-150 py-2 px-1 text-slate-700">
					Más vendidos
				</a>
				<a routerLink="/favoritos" routerLinkActive="text-blue-600 font-bold border-b-2 border-blue-600"
					class="hover:text-blue-600 transition-all duration-150 py-2 px-1 text-slate-700">
					Mis favoritos
				</a>
				<a routerLink="/marcas" routerLinkActive="text-blue-600 font-bold border-b-2 border-blue-600"
					class="hover:text-blue-600 transition-all duration-150 py-2 px-1 text-slate-700">
					Marcas
				</a>
				<a routerLink="/contacto" routerLinkActive="text-blue-600 font-bold border-b-2 border-blue-600"
					class="hover:text-blue-600 transition-all duration-150 py-2 px-1 text-slate-700">
					Contacto
				</a>
			</div>
		</div>
	</div>
</nav>
