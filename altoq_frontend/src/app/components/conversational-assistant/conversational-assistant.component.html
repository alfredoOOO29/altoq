<div class="assistant-container">
  <div class="assistant-header">
    <h2>🤖 Asistente de Productos</h2>
    <button (click)="resetConversation()" class="reset-btn">Reiniciar</button>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div *ngFor="let message of messages" [class]="message.sender === 'user' ? 'user-message' : 'assistant-message'">
      <div class="message-content">
        <span *ngIf="message.sender === 'assistant'" class="assistant-icon">🤖</span>
        <span *ngIf="message.sender === 'user'" class="user-icon">👤</span>
        <p>{{ message.content }}</p>
      </div>
    </div>
    <div *ngIf="isTyping" class="typing-indicator">
      <span class="assistant-icon">🤖</span>
      <p>Escribiendo...</p>
    </div>
  </div>

  <div class="input-area">
    <input 
      type="text" 
      [(ngModel)]="userInput" 
      (keyup.enter)="handleUserInput(userInput); userInput = ''"
      placeholder="Escribe tu respuesta aquí..."
      class="message-input"
      [disabled]="isCreatingProduct"
    >
    <button (click)="handleUserInput(userInput); userInput = ''" class="send-btn" [disabled]="isCreatingProduct">
      Enviar
    </button>
    <button 
      *ngIf="currentQuestion === 'confirm_creation'" 
      (click)="createProduct()" 
      class="confirm-btn"
      [disabled]="isCreatingProduct">
      {{ isCreatingProduct ? 'Creando...' : 'Crear Producto' }}
    </button>
  </div>
</div>
