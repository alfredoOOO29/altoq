<div class="assistant-container">
  <!-- Header -->
  <div class="assistant-header">
    <div class="header-title-area">
      <div class="header-avatar">🤖</div>
      <div class="header-info">
        <h2>Asistente de Productos</h2>
        <span class="header-status">
          <span class="status-dot"></span> Activo
        </span>
      </div>
    </div>
    <button (click)="resetConversation()" class="reset-btn" title="Reiniciar conversación">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="btn-icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
      </svg>
      <span>Reiniciar</span>
    </button>
  </div>

  <!-- Messages List -->
  <div class="chat-messages" id="chatMessages">
    <div *ngFor="let message of messages" 
         [class]="message.sender === 'user' ? 'message-row user-message' : 'message-row assistant-message'">
      <div class="message-content">
        <!-- Avatar -->
        <div *ngIf="message.sender === 'assistant'" class="avatar assistant-avatar-icon">🤖</div>
        <div *ngIf="message.sender === 'user'" class="avatar user-avatar-icon">👤</div>
        <!-- Bubble Text -->
        <div class="message-bubble">
          <p>{{ message.content }}</p>
        </div>
      </div>
    </div>
    
    <!-- Typing Indicator -->
    <div *ngIf="isTyping" class="message-row assistant-message typing-row">
      <div class="message-content">
        <div class="avatar assistant-avatar-icon">🤖</div>
        <div class="message-bubble typing-bubble">
          <div class="typing-indicator-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-wrapper">
      <input
        type="text"
        [(ngModel)]="userInput"
        (keyup.enter)="handleUserInput(userInput); userInput = ''"
        placeholder="Escribe tu respuesta aquí..."
        class="message-input"
        [disabled]="isCreatingProduct"
      >
    </div>

    <button (click)="handleUserInput(userInput); userInput = ''"
            class="send-btn"
            [disabled]="isCreatingProduct"
            title="Enviar">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="send-icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
      </svg>
    </button>

    <!-- Confirm Product Button -->
    <button
      *ngIf="currentQuestion === 'confirm_creation'"
      (click)="createProduct()"
      class="confirm-btn"
      [disabled]="isCreatingProduct">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="confirm-icon" *ngIf="!isCreatingProduct">
        <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
      </svg>
      <span>{{ isCreatingProduct ? 'Creando...' : 'Crear Producto' }}</span>
    </button>
  </div>
</div>
