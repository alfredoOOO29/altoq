<div class="max-w-3xl mx-auto my-8 bg-white rounded-xl shadow-md overflow-hidden flex flex-col font-sans border border-gray-200">
  <!-- Header -->
  <div class="bg-slate-900 text-white px-6 py-5 flex justify-between items-center">
    <div class="flex items-center gap-4">
      <div class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-800 text-gray-300 border border-slate-700">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 .75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349M3.75 21V9.349m0 0a3.001 3.001 0 0 0 3.75-.615A2.993 2.993 0 0 0 9.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 0 0 2.25 1.016c.896 0 1.7-.393 2.25-1.015a3.001 3.001 0 0 0 3.75.614m-16.5 0a3.004 3.004 0 0 1-.621-4.72l1.189-1.19A1.5 1.5 0 0 1 5.378 3h13.243a1.5 1.5 0 0 1 1.06.44l1.19 1.189a3 3 0 0 1-.621 4.72M6.75 18h3.75a.75.75 0 0 0 .75-.75V13.5a.75.75 0 0 0-.75-.75H6.75a.75.75 0 0 0-.75.75v3.75c0 .414.336.75.75.75Z" />
        </svg>
      </div>
      <div class="flex flex-col">
        <h2 class="text-base font-semibold tracking-wide m-0">Asistente de Productos</h2>
        <div class="flex items-center gap-2 mt-1">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
          <span class="text-xs text-slate-300 font-medium uppercase tracking-wider">En línea</span>
        </div>
      </div>
    </div>
    <button (click)="resetConversation()" class="p-2 rounded-md hover:bg-slate-800 transition-colors border border-transparent hover:border-slate-700 text-slate-300" title="Reiniciar sesión">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
      </svg>
    </button>
  </div>

  <!-- Messages -->
  <div #chatContainer class="flex-1 h-[500px] overflow-y-auto p-8 bg-gray-50 flex flex-col gap-6 scroll-smooth">
    <div *ngFor="let message of messages" class="flex w-full" [ngClass]="message.sender === 'user' ? 'justify-end' : 'justify-start'">
      <div class="flex items-end gap-3 max-w-[85%]" [ngClass]="message.sender === 'user' ? 'flex-row-reverse' : ''">
        
        <!-- Avatar -->
        <div class="flex items-center justify-center w-8 h-8 rounded-full shrink-0" 
             [ngClass]="message.sender === 'user' ? 'bg-slate-200 text-slate-600' : 'bg-white border border-gray-200 text-slate-800 shadow-sm'">
          <ng-container *ngIf="message.sender === 'user'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
              <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.75 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z" clip-rule="evenodd" />
            </svg>
          </ng-container>
          <ng-container *ngIf="message.sender !== 'user'">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Z" />
            </svg>
          </ng-container>
        </div>

        <!-- Bubble -->
        <div class="px-5 py-3.5 text-[0.95rem] leading-relaxed rounded-2xl shadow-sm"
             [ngClass]="message.sender === 'user' ? 'bg-slate-900 text-white rounded-br-sm' : 'bg-white text-gray-800 rounded-bl-sm border border-gray-200/60'">
          <p class="whitespace-pre-wrap m-0 font-normal" [innerHTML]="message.content | markdownFormat"></p>
        </div>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div *ngIf="isTyping" class="flex w-full justify-start">
      <div class="flex items-end gap-3 max-w-[80%]">
        <div class="flex items-center justify-center w-8 h-8 rounded-full shrink-0 bg-white border border-gray-200 text-slate-800 shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Z" />
          </svg>
        </div>
        <div class="px-5 py-4 bg-white rounded-2xl rounded-bl-sm border border-gray-200/60 flex flex-col gap-2 shadow-sm min-w-[200px]">
          <!-- Skeleton Text Lines -->
          <div class="h-3 bg-slate-200 rounded-full animate-pulse w-3/4"></div>
          <div class="h-3 bg-slate-200 rounded-full animate-pulse w-full"></div>
          <div class="h-3 bg-slate-200 rounded-full animate-pulse w-2/3"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Input Area Normal (cuando NO está esperando imagen) -->
  <div *ngIf="!awaitingImage" class="p-5 bg-white border-t border-gray-200 flex items-center gap-3">
    <div class="flex-1 bg-gray-50 border border-gray-300 rounded-lg px-4 py-3 focus-within:bg-white focus-within:border-slate-500 focus-within:ring-1 focus-within:ring-slate-500 transition-all">
      <input 
        type="text" 
        [(ngModel)]="userInput" 
        (keyup.enter)="handleUserInput(userInput); userInput = ''"
        placeholder="Escribe aquí los detalles de tu producto..."
        class="w-full bg-transparent border-none text-gray-800 text-[0.95rem] outline-none placeholder:text-gray-400 disabled:opacity-50"
        [disabled]="isCreatingProduct"
      >
    </div>

    <button (click)="handleUserInput(userInput); userInput = ''" 
            class="flex items-center justify-center w-12 h-12 bg-slate-900 text-white rounded-lg hover:bg-slate-800 transition-colors disabled:bg-gray-200 disabled:text-gray-400 disabled:cursor-not-allowed"
            [disabled]="isCreatingProduct || !userInput.trim()"
            title="Enviar">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
        <path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z" />
      </svg>
    </button>
  </div>

  <!-- Área de Acción Premium para Paso Final de Imagen (cuando SI está esperando imagen) -->
  <div *ngIf="awaitingImage" class="p-6 bg-slate-50 border-t border-gray-200 flex flex-col gap-4 animate-fade-in">
    
    <div class="text-center mb-1">
      <h3 class="text-sm font-bold text-slate-800">📸 Agrega una imagen para destacar tu producto</h3>
      <p class="text-xs text-slate-500 mt-0.5">Elige cómo deseas añadir la foto de tu nuevo artículo.</p>
    </div>

    <!-- OPCIÓN 1: Menu de Selección Principal -->
    <div *ngIf="imageInputMode === 'choice'" class="flex flex-col sm:flex-row gap-3 justify-center items-center">
      
      <!-- Botón Subir Imagen -->
      <button (click)="selectUploadMode()" 
              class="flex items-center justify-center gap-2 w-full sm:w-auto px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm rounded-xl shadow-sm hover:shadow-md transition-all active:scale-95 duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
        </svg>
        Subir desde dispositivo
      </button>

      <!-- Botón Ingresar URL -->
      <button (click)="selectUrlMode()" 
              class="flex items-center justify-center gap-2 w-full sm:w-auto px-6 py-3 bg-white hover:bg-slate-100 text-slate-700 font-semibold text-sm rounded-xl border border-gray-300 shadow-sm transition-all active:scale-95 duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244" />
        </svg>
        Ingresar URL de imagen
      </button>

      <!-- Botón Omitir -->
      <button (click)="cancelImageStep()" 
              class="w-full sm:w-auto px-4 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium text-xs rounded-xl transition-all">
        Omitir por ahora
      </button>
    </div>

    <!-- MODO: Cargar Archivo (Físico) -->
    <div *ngIf="imageInputMode === 'upload'" class="flex flex-col items-center gap-3">
      <div class="w-full max-w-md p-4 border-2 border-dashed border-indigo-300 rounded-xl bg-indigo-50/30 text-center hover:bg-indigo-50/50 transition-colors relative">
        <div *ngIf="isUploading" class="absolute inset-0 bg-white/50 flex items-center justify-center rounded-xl z-10">
          <span class="text-indigo-600 font-bold text-sm">Subiendo...</span>
        </div>
        <label class="cursor-pointer flex flex-col items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-indigo-500 animate-bounce">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span class="text-xs font-semibold text-slate-700">Haz clic para buscar o arrastra una imagen</span>
          <span class="text-[10px] text-slate-400">Formatos recomendados: PNG, JPG, WEBP</span>
          <input type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)" [disabled]="isUploading">
        </label>
      </div>
      
      <button (click)="imageInputMode = 'choice'" class="text-xs text-indigo-600 font-semibold hover:underline" [disabled]="isUploading">
        Volver a las opciones
      </button>
    </div>

    <!-- MODO: Pegar URL de Imagen -->
    <div *ngIf="imageInputMode === 'url'" class="w-full max-w-md mx-auto flex flex-col gap-3">
      <div class="flex gap-2 w-full">
        <input 
          type="text" 
          [(ngModel)]="inputImageUrl" 
          placeholder="Pega el enlace de la imagen aquí (https://...)"
          class="flex-1 px-4 py-2.5 rounded-xl border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500"
          [disabled]="isUploading"
        />
        <button 
          (click)="saveImageUrl()" 
          [disabled]="!inputImageUrl.trim() || isUploading"
          class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 text-white font-semibold text-sm rounded-xl transition-all">
          {{ isUploading ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
      
      <button (click)="imageInputMode = 'choice'" class="text-xs text-indigo-600 font-semibold hover:underline text-center" [disabled]="isUploading">
        Volver a las opciones
      </button>
    </div>

  </div>
</div>
