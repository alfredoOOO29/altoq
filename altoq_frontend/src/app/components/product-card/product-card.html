<!-- Card wrapper -->
<div class="rounded-2xl border border-slate-200 bg-white overflow-hidden cursor-pointer flex flex-col h-full shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-300" (click)="goToDetail($event)">

  <!-- ===== IMAGE SECTION ===== -->
  <div class="relative bg-slate-50 aspect-square overflow-hidden flex items-center justify-center shrink-0">
    <!-- Main Image -->
    <img *ngIf="product.image" [src]="selectedImage || product.image" [alt]="product.name"
      class="w-full h-full object-cover transition-transform duration-500 hover:scale-105" />
    <div *ngIf="!product.image" class="flex w-full h-full items-center justify-center text-slate-400 text-sm">
      Sin imagen
    </div>

    <!-- Out of stock badge -->
    <div *ngIf="product.stock <= 0 || product.stock === null"
      class="absolute top-3 left-3 z-10 bg-red-500 text-white text-[10px] font-bold uppercase px-2.5 py-1 rounded-full shadow">
      Agotado
    </div>

    <!-- Favorite button -->
    <button (click)="toggleFavorite($event)"
      class="absolute top-3 right-3 z-10 w-9 h-9 rounded-full bg-white shadow-md flex items-center justify-center transition-all duration-200 hover:scale-110 active:scale-95 cursor-pointer text-slate-300 hover:text-red-400"
      [class.!text-red-500]="isFav">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-5 h-5 transition-all duration-200"
        [attr.fill]="isFav ? 'currentColor' : 'none'"
        stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
      </svg>
    </button>
  </div>

  <!-- ===== CONTENT SECTION ===== -->
  <div class="p-3 flex flex-col flex-grow bg-white">
    <!-- Name -->
    <h3 class="text-sm font-bold text-slate-900 line-clamp-1 leading-snug">{{ product.name }}</h3>

    <!-- Store Name -->
    <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mt-0.5">
      {{ product.store_name || 'ALTOQ STORE' }}
    </p>

    <!-- Rating -->
    <div class="mt-2 flex items-center gap-1.5">
      <div class="flex items-center gap-0.5 text-yellow-400">
        <ng-container *ngFor="let star of getStars()">
          <!-- Full Star -->
          <svg *ngIf="star === 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3.5 h-3.5">
            <path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" clip-rule="evenodd" />
          </svg>
          <!-- Half Star -->
          <svg *ngIf="star === 0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3.5 h-3.5" fill-opacity="0.5">
            <path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" clip-rule="evenodd" />
          </svg>
          <!-- Empty Star -->
          <svg *ngIf="star === 0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3.5 h-3.5 text-slate-200">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.545.044.757.746.357 1.107l-4.201 3.804a.563.563 0 00-.163.505l1.282 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.163-.505l-4.202-3.804c-.399-.36-.188-1.063.357-1.107l5.519-.442a.563.563 0 00.475-.345L11.48 3.5z" />
          </svg>
        </ng-container>
      </div>
      <span class="text-xs text-slate-400">({{ product.rating_count || 0 }})</span>
    </div>

    <!-- Price + Add to cart -->
    <div class="mt-auto pt-3 flex items-center justify-between border-t border-slate-50">
      <span class="text-base font-extrabold text-[#0050d2]">S/ {{ product.price | number:'1.2-2' }}</span>
      <button
        (click)="onAddToCart($event)"
        [disabled]="product.stock <= 0 || product.stock === null"
        [class.opacity-40]="product.stock <= 0 || product.stock === null"
        [class.cursor-not-allowed]="product.stock <= 0 || product.stock === null"
        class="w-9 h-9 flex items-center justify-center border border-[#0050d2] text-[#0050d2] hover:bg-blue-50/50 rounded-xl transition-all duration-200 active:scale-95 cursor-pointer"
        [title]="(product.stock <= 0 || product.stock === null) ? 'Sin stock' : 'Agregar al carrito'">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
      </button>
    </div>

  </div>
</div>
