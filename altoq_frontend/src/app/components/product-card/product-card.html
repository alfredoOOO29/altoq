
<div class="rounded-lg border border-slate-200 bg-white overflow-hidden cursor-pointer group flex flex-col h-full" (click)="goToDetail($event)">
  <div class="block relative h-48 sm:h-56"> <!-- Fixed height image container -->
    <div *ngIf="product.stock <= 0 || product.stock === null" class="absolute top-2 left-2 z-10 bg-red-600 text-white text-[10px] font-bold uppercase px-2 py-0.5 rounded shadow-sm">
      Agotado
    </div>
    <img *ngIf="product.image" [src]="product.image" [alt]="product.name" class="w-full h-full object-cover" />
    <div *ngIf="!product.image" class="flex w-full h-full items-center justify-center bg-slate-100 text-slate-500">Sin imagen</div>
  </div>
	<div class="p-4 flex flex-col flex-grow">
		<div class="text-sm font-semibold text-slate-900 group-hover:underline line-clamp-1">{{ product.name }}</div>
    
    <!-- Store Name with Link -->
    <div class="flex items-center justify-between mt-0.5">
      <div class="text-xs font-medium text-slate-500 uppercase tracking-wide">{{ product.store_name || 'Tienda Genérica' }}</div>
      <button *ngIf="product.store_id" (click)="goToStore($event)" class="text-xs text-blue-600 hover:text-blue-800 font-medium transition-colors">
        Ver Tienda
      </button>
    </div>

		<p class="mt-2 text-sm text-slate-600 line-clamp-2 h-10">{{ product.description }}</p>

    <!-- Rating Section -->
    <div class="mt-2 flex items-center gap-1">
      <div class="flex items-center text-yellow-500">
        <span class="text-xs font-bold mr-1 text-slate-700">{{ product.rating || 0 }}</span>
        <ng-container *ngFor="let star of getStars()">
           <svg *ngIf="star === 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3 h-3">
            <path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" clip-rule="evenodd" />
          </svg>
          <svg *ngIf="star === 0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3 h-3">
             <path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" clip-rule="evenodd" fill-opacity="0.5"/>
             <defs>
              <linearGradient id="half-card">
                <stop offset="50%" stop-color="currentColor"/>
                <stop offset="50%" stop-color="transparent" stop-opacity="0" />
              </linearGradient>
            </defs>
             <path fill="url(#half-card)" fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" clip-rule="evenodd" />
          </svg>
          <svg *ngIf="star === 0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3 h-3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.545.044.757.746.357 1.107l-4.201 3.804a.563.563 0 00-.163.505l1.282 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.163-.505l-4.202-3.804c-.399-.36-.188-1.063.357-1.107l5.519-.442a.563.563 0 00.475-.345L11.48 3.5z" />
          </svg>
        </ng-container>
      </div>
      <span class="text-xs text-slate-500">({{ product.rating_count || 0 }})</span>
    </div>

		<div class="mt-auto pt-4 flex items-center justify-between border-t border-slate-100">
			<span class="text-lg font-bold text-[#0050d2]">S/ {{ product.price | number:'1.2-2' }}</span>
      <button 
        (click)="onAddToCart($event)" 
        [disabled]="product.stock <= 0 || product.stock === null"
        [class.opacity-40]="product.stock <= 0 || product.stock === null"
        [class.cursor-not-allowed]="product.stock <= 0 || product.stock === null"
        class="inline-flex items-center justify-center rounded-lg border border-[#0050d2] text-[#0050d2] bg-transparent p-2 hover:bg-[#0050d2] hover:text-white transition-all duration-200 shadow-sm cursor-pointer"
        [title]="(product.stock <= 0 || product.stock === null) ? 'Sin stock' : 'Agregar al carrito'">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
      </button>
		</div>
	</div>
</div>
