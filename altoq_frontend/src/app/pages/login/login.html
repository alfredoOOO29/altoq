<div class="min-h-screen bg-gradient-to-br from-blue-50 to-slate-100 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <!-- Card Container -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-slate-900 mb-2">Bienvenido de nuevo</h1>
        <p class="text-slate-600">Inicia sesión para continuar comprando</p>
      </div>

      <!-- Google Sign In Button -->
      <div id="google-btn" class="w-full mb-6 flex justify-center"></div>

      <!-- Divider -->
      <div class="relative mb-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-slate-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-4 bg-white text-slate-500">o inicia con tu correo</span>
        </div>
      </div>

      <!-- Login Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <!-- Error Message -->
        <div *ngIf="error" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4">
          {{ error }}
        </div>

        <!-- Email Input -->
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-2">Correo electrónico</label>
          <input 
            type="email" 
            id="email" 
            formControlName="email"
            placeholder="tu@ejemplo.com"
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            [class.border-red-300]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          />
          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-red-500 text-xs mt-1">
            Correo inválido
          </div>
        </div>

        <!-- Password Input -->
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-2">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            formControlName="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            [class.border-red-300]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          />
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-red-500 text-xs mt-1">
            Contraseña requerida
          </div>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="flex items-center justify-between text-sm">
          <div class="flex items-center">
            <input type="checkbox" id="remember" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
            <label for="remember" class="ml-2 text-slate-600">Recordarme</label>
          </div>
          <a href="#" class="text-blue-600 hover:text-blue-700 font-medium">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit"
          [disabled]="loginForm.invalid || loading"
          class="w-full bg-blue-600 text-white rounded-lg px-6 py-3 font-medium hover:bg-blue-700 transition-colors shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center"
        >
          <span *ngIf="loading" class="mr-2">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </span>
          Iniciar sesión
        </button>
      </form>

      <!-- Register Link -->
      <div class="mt-6 text-center text-sm text-slate-600">
        ¿No tienes una cuenta?
        <a routerLink="/register" class="text-blue-600 hover:text-blue-700 font-medium ml-1">Regístrate gratis</a>
      </div>
    </div>
  </div>
</div>
