<div class="min-h-screen bg-gradient-to-br from-blue-50 to-slate-100 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <!-- Card Container -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-slate-900 mb-2">Crea tu cuenta</h1>
        <p class="text-slate-600">Únete a ALTOQ y empieza a comprar</p>
      </div>

      <!-- Google Sign Up Button -->
      <div id="google-btn-register" class="w-full mb-6 flex justify-center"></div>

      <!-- Divider -->
      <div class="relative mb-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-slate-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-4 bg-white text-slate-500">o completa el formulario</span>
        </div>
      </div>

      <!-- Registration Form -->
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <!-- Error Message -->
        <div *ngIf="error" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4">
          {{ error }}
        </div>

        <!-- Name Input -->
        <div>
          <label for="name" class="block text-sm font-medium text-slate-700 mb-2">Nombre completo</label>
          <input 
            type="text" 
            id="name" 
            formControlName="name"
            placeholder="Juan Pérez"
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            [class.border-red-300]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched"
          />
          <div *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched" class="text-red-500 text-xs mt-1">
            Nombre requerido
          </div>
        </div>

        <!-- Email Input -->
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-2">Correo electrónico</label>
          <input 
            type="email" 
            id="email" 
            formControlName="email"
            placeholder="tu@ejemplo.com"
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            [class.border-red-300]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
          />
          <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="text-red-500 text-xs mt-1">
            Correo inválido
          </div>
        </div>

        <!-- Password Input -->
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-2">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            formControlName="password"
            placeholder="Mínimo 8 caracteres"
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            [class.border-red-300]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
          />
          <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="text-red-500 text-xs mt-1">
            Mínimo 8 caracteres
          </div>
        </div>

        <!-- Confirm Password Input -->
        <div>
          <label for="confirm-password" class="block text-sm font-medium text-slate-700 mb-2">Confirmar contraseña</label>
          <input 
            type="password" 
            id="confirm-password" 
            formControlName="confirmPassword"
            placeholder="Repite tu contraseña"
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            [class.border-red-300]="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched"
          />
          <div *ngIf="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched" class="text-red-500 text-xs mt-1">
            Las contraseñas no coinciden
          </div>
        </div>

        <!-- Terms & Conditions -->
        <div class="flex items-start gap-2">
          <input type="checkbox" id="terms" formControlName="terms" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500 mt-1">
          <label for="terms" class="text-sm text-slate-600">
            Acepto los <a href="#" class="text-blue-600 hover:text-blue-700 font-medium">términos y condiciones</a> y la <a href="#" class="text-blue-600 hover:text-blue-700 font-medium">política de privacidad</a>
          </label>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit"
          [disabled]="registerForm.invalid || loading"
          class="w-full bg-blue-600 text-white rounded-lg px-6 py-3 font-medium hover:bg-blue-700 transition-colors shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center"
        >
          <span *ngIf="loading" class="mr-2">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </span>
          Crear cuenta
        </button>
      </form>

      <!-- Login Link -->
      <div class="mt-6 text-center text-sm text-slate-600">
        ¿Ya tienes una cuenta?
        <a routerLink="/login" class="text-blue-600 hover:text-blue-700 font-medium ml-1">Inicia sesión</a>
      </div>
    </div>
  </div>
</div>
