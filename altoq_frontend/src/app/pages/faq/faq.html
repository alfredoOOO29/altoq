<div class="bg-slate-50 min-h-screen font-sans py-12 px-4">
  <div class="max-w-3xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-12">
      <span class="text-xs uppercase tracking-widest text-[#0050d2] font-black">Centro de ayuda</span>
      <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 mt-2">Preguntas Frecuentes</h1>
      <p class="text-sm md:text-base text-slate-500 mt-3 max-w-xl mx-auto">
        Encuentra respuestas a las dudas más comunes sobre compras, envíos, métodos de pago y gestión de tiendas virtuales.
      </p>
    </div>

    <!-- FAQ Accordion -->
    <div class="space-y-4">
      <div *ngFor="let item of faqs; let i = index" 
        class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden transition-all duration-200"
        [class.border-blue-100]="item.isOpen" [class.shadow-md]="item.isOpen">
        <!-- Question Row -->
        <button (click)="toggleFaq(i)"
          class="w-full text-left px-6 py-5 flex items-center justify-between gap-4 font-bold text-slate-800 hover:text-[#0050d2] transition-colors focus:outline-none cursor-pointer">
          <span class="text-sm md:text-base">{{ item.question }}</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 shrink-0 transition-transform duration-300"
            [class.rotate-180]="item.isOpen" [class.text-[#0050d2]]="item.isOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>

        <!-- Answer Row -->
        <div class="transition-all duration-300 ease-in-out overflow-hidden" 
          [style.maxHeight]="item.isOpen ? '300px' : '0px'"
          [style.opacity]="item.isOpen ? '1' : '0'">
          <div class="px-6 pb-5 text-sm text-slate-500 border-t border-slate-50 pt-3 leading-relaxed">
            {{ item.answer }}
          </div>
        </div>
      </div>
    </div>

    <!-- FAQ Footer Callout -->
    <div class="mt-12 text-center py-6">
      <p class="text-sm text-slate-500">¿Aún tienes dudas?</p>
      <a routerLink="/contacto" class="inline-flex items-center gap-1.5 text-sm font-bold text-[#0050d2] hover:underline mt-2">
        <span>Contáctanos directamente</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </a>
    </div>
  </div>
</div>
