<section class="mx-auto max-w-4xl px-4 py-6">
	<h2 class="text-2xl font-semibold text-slate-900">Finalizar Compra</h2>

	<div *ngIf="cart.items.length > 0; else emptyCart" class="mt-6 grid gap-6 md:grid-cols-2">
		<!-- Formulario -->
		<div class="rounded-lg border border-slate-200 bg-white p-6">
			<h3 class="text-lg font-semibold text-slate-900">Datos de Envío</h3>
			<form (ngSubmit)="onSubmit()" class="mt-4 space-y-4">
				<div>
					<label for="name" class="block text-sm font-medium text-slate-700">Nombre Completo</label>
					<input [(ngModel)]="name" name="name" id="name" type="text" required class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500" />
				</div>
				<div>
					<label for="email" class="block text-sm font-medium text-slate-700">Email</label>
					<input [(ngModel)]="email" name="email" id="email" type="email" required class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500" />
				</div>
				<div>
					<label for="address" class="block text-sm font-medium text-slate-700">Dirección</label>
					<textarea [(ngModel)]="address" name="address" id="address" rows="3" required class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500"></textarea>
				</div>
				<div>
					<label for="phone" class="block text-sm font-medium text-slate-700">Teléfono</label>
					<input [(ngModel)]="phone" name="phone" id="phone" type="tel" required class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500" />
				</div>
				<button type="submit" [disabled]="processing" class="w-full rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800 disabled:bg-slate-400">
					{{ processing ? 'Procesando...' : 'Confirmar Compra' }}
				</button>
			</form>
		</div>

		<!-- Resumen -->
		<div>
			<div class="rounded-lg border border-slate-200 bg-white p-6">
				<h3 class="text-lg font-semibold text-slate-900">Resumen de la Orden</h3>
				<div class="mt-4 space-y-3">
					<div *ngFor="let item of cart.items" class="flex items-center justify-between text-sm">
						<span class="text-slate-700">{{ item.name }} x{{ item.quantity }}</span>
						<span class="font-medium text-slate-900">S/ {{ (item.price * item.quantity) | number:'1.2-2' }}</span>
					</div>
				</div>
				<div class="mt-4 border-t border-slate-200 pt-4">
					<div class="flex items-center justify-between text-lg font-bold text-slate-900">
						<span>Total:</span>
						<span>S/ {{ cart.totalPrice | number:'1.2-2' }}</span>
					</div>
				</div>
			</div>
		</div>
	</div>

	<ng-template #emptyCart>
		<div class="mt-12 text-center">
			<p class="text-lg text-slate-600">Tu carrito está vacío</p>
			<a routerLink="/" class="mt-4 inline-block rounded-md bg-slate-900 px-6 py-2 text-sm font-medium text-white hover:bg-slate-800">Ir a Comprar</a>
		</div>
	</ng-template>
</section>
