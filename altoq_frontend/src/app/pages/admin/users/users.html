<div>
  <h2 class="text-2xl font-bold text-slate-900 mb-6">Gestión de Usuarios</h2>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="flex items-center justify-center py-12">
    <div class="text-slate-600">Cargando usuarios...</div>
  </div>

  <!-- Users Table -->
  <div *ngIf="!isLoading" class="bg-white rounded-lg shadow overflow-hidden">
    <table class="min-w-full divide-y divide-slate-200">
      <thead class="bg-slate-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">ID</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Nombre</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Email</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Teléfono</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Registrado</th>
          <th class="px-6 py-3 text-right text-xs font-medium text-slate-500 uppercase tracking-wider">Acciones</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-slate-200">
        <tr *ngFor="let user of users" class="hover:bg-slate-50">
          <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">{{ user.id }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">{{ user.name }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{{ user.email }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{{ user.phone || 'N/A' }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{{ user.created_at | date:'short' }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
            <button (click)="deleteUser(user.id)" class="text-red-600 hover:text-red-900 transition-colors">
              Eliminar
            </button>
          </td>
        </tr>
        <tr *ngIf="users.length === 0">
          <td colspan="6" class="px-6 py-8 text-center text-slate-500">
            No hay usuarios registrados
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
