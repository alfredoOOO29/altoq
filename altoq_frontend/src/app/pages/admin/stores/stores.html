<div>
  <h2 class="text-2xl font-bold text-slate-900 mb-6">Gestión de Tiendas</h2>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="flex items-center justify-center py-12">
    <div class="text-slate-600">Cargando tiendas...</div>
  </div>

  <!-- Stores Table -->
  <div *ngIf="!isLoading" class="bg-white rounded-lg shadow overflow-hidden">
    <table class="min-w-full divide-y divide-slate-200">
      <thead class="bg-slate-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">ID</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Nombre</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Email</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Propietario</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Estado</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Registrado</th>
          <th class="px-6 py-3 text-right text-xs font-medium text-slate-500 uppercase tracking-wider">Acciones</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-slate-200">
        <tr *ngFor="let store of stores" class="hover:bg-slate-50">
          <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">{{ store.id }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">{{ store.name }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{{ store.email }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{{ store.owner_name || 'N/A' }}</td>
          <td class="px-6 py-4 whitespace-nowrap">
            <span [ngClass]="{
              'bg-green-100 text-green-800': store.status === 'active',
              'bg-yellow-100 text-yellow-800': store.status === 'pending',
              'bg-red-100 text-red-800': store.status === 'suspended'
            }" class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full">
              {{ getStatusText(store.status) }}
            </span>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{{ store.created_at | date:'short' }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
            <select (change)="changeStatus(store, $event)" [value]="store.status" class="text-xs border border-slate-300 rounded px-2 py-1">
              <option value="pending">Pendiente</option>
              <option value="active">Activa</option>
              <option value="suspended">Suspendida</option>
            </select>
            <button (click)="deleteStore(store.id)" class="text-red-600 hover:text-red-900 transition-colors ml-2">
              Eliminar
            </button>
          </td>
        </tr>
        <tr *ngIf="stores.length === 0">
          <td colspan="7" class="px-6 py-8 text-center text-slate-500">
            No hay tiendas registradas
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
