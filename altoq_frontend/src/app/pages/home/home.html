<div class="bg-white">
  <!-- Hero Section -->
  <div class="relative isolate px-6 pt-14 lg:px-8">
    <div class="mx-auto max-w-2xl py-12 sm:py-24 lg:py-32">
      <div class="text-center">
        <h1 class="text-4xl font-bold tracking-tight text-gray-900 sm:text-6xl">Todo lo que necesitas, al toque</h1>
        <p class="mt-6 text-lg leading-8 text-slate-600">Descubre nuestra colección de productos de alta calidad pensados para ti. Compra fácil, rápido y seguro.</p>
        <div class="mt-10 flex items-center justify-center gap-x-6">
          <a routerLink="/products" class="rounded-md bg-slate-900 px-3.5 py-2.5 text-sm font-bold text-white shadow-sm hover:bg-slate-800 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-600 transition-colors">Ver Catálogo</a>
          <a routerLink="/about" class="text-sm font-semibold leading-6 text-slate-900 hover:text-blue-600 transition-colors">Leer más <span aria-hidden="true">→</span></a>
        </div>
      </div>
    </div>
  </div>

  <!-- Featured Products -->
  <section class="mx-auto max-w-6xl px-4 py-12">
    <div class="flex items-center justify-between mb-6">
       <h2 class="text-2xl font-bold text-slate-900">Productos Destacados</h2>
       <a routerLink="/products" class="text-sm font-medium text-slate-600 hover:text-slate-900">Ver todos →</a>
    </div>

    <div *ngIf="error" class="mt-4 rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-800">{{ error }}</div>

    <div class="mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 items-stretch">
      <ng-container *ngIf="products$ | async as products; else loading">
        <app-product-card *ngFor="let product of products" [product]="product" (addToCart)="onAddToCart($event)" class="h-full"></app-product-card>
      </ng-container>
      <ng-template #loading>
        <p class="text-slate-600">Cargando productos destacados...</p>
      </ng-template>
    </div>
  </section>
</div>
