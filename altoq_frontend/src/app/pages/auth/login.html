<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4">
  <div class="w-full max-w-md rounded-lg bg-white p-8 shadow">
    <h1 class="text-2xl font-semibold text-slate-900">Iniciar sesión</h1>
    <p class="mt-2 text-sm text-slate-600">Ingresa con tu correo y contraseña.</p>

    <div *ngIf="error" class="mt-4 rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-800">{{ error }}</div>

    <form (ngSubmit)="onSubmit()" class="mt-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700">Correo</label>
        <input [(ngModel)]="email" name="email" type="email" class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-900 focus:outline-none" placeholder="tu@email.com" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Contraseña</label>
        <input [(ngModel)]="password" name="password" type="password" class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-900 focus:outline-none" placeholder="••••••••" />
      </div>
      <button [disabled]="loading" type="submit" class="w-full inline-flex items-center justify-center rounded-md bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800 disabled:opacity-60">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>

    <p class="mt-4 text-sm text-center text-slate-600">
      ¿No tienes cuenta? <a routerLink="/register" class="font-semibold text-slate-900 hover:underline">Crear cuenta</a>
    </p>
  </div>
</div>
