<section class="mx-auto max-w-6xl px-4 py-6">
	<h2 class="text-xl font-semibold text-slate-900">Todos los Productos</h2>

	<div *ngIf="error" class="mt-4 rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-800">{{ error }}</div>

	<div class="mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 items-stretch">
		<ng-container *ngIf="products$ | async as products; else loading">
			<app-product-card *ngFor="let product of products" [product]="product" (addToCart)="onAddToCart($event)" class="h-full"></app-product-card>
		</ng-container>
		<ng-template #loading>
			<p class="text-slate-600">Cargando productos...</p>
		</ng-template>
	</div>
</section>
