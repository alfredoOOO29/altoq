<section class="mx-auto max-w-6xl px-4 py-6">
	<h2 class="text-xl font-semibold text-slate-900">Todos los Productos</h2>

	<div *ngIf="error" class="mt-4 rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-800">{{ error }}</div>

	<div class="mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 items-stretch">
		<ng-container *ngIf="products$ | async as products; else loading">
			<app-product-card *ngFor="let product of products" [product]="product" (addToCart)="onAddToCart($event)" class="h-full"></app-product-card>
		</ng-container>
		<ng-template #loading>
			<!-- Skeleton Loader Cards (x6) -->
			<div *ngFor="let i of [1,2,3,4,5,6]" class="flex flex-col gap-3 rounded-lg border border-slate-200 p-4 shadow-sm h-full animate-pulse">
				<div class="h-48 w-full bg-slate-200 rounded-md"></div>
				<div class="h-5 w-3/4 bg-slate-200 rounded mt-2"></div>
				<div class="h-4 w-1/2 bg-slate-200 rounded"></div>
				<div class="h-4 w-full bg-slate-200 rounded mt-1"></div>
				<div class="mt-auto pt-4 flex justify-between items-center">
					<div class="h-6 w-1/3 bg-slate-200 rounded"></div>
					<div class="h-8 w-24 bg-slate-200 rounded-full"></div>
				</div>
			</div>
		</ng-template>
	</div>
</section>
